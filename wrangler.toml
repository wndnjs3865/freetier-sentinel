name = "freetier-sentinel"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Replace database_id after running:
#   npx wrangler d1 create freetier-sentinel-db
[[d1_databases]]
binding = "DB"
database_name = "freetier-sentinel-db"
database_id = "bb5edd36-0557-4d91-861c-37146bfa8494"

[[kv_namespaces]]
binding = "KV"
id = "dd8a3f635fe24c5eb1d3cf8285f425a9"

[triggers]
crons = ["0 */6 * * *"]   # every 6 hours

[vars]
APP_URL = "https://freetier-sentinel.dev"
STRIPE_PRICE_ID = "price_REPLACE"
STRIPE_PAYMENT_LINK = "https://buy.stripe.com/test_8x2fZi6Ywbay0Wl3ve8Ra00"
RESEND_FROM = "FreeTier Sentinel <noreply@freetier-sentinel.dev>"

# Secrets (set via: wrangler secret put NAME)
# - MASTER_KEY            (32-byte base64 for AES-GCM)
# - STRIPE_SECRET_KEY     (sk_live_... or sk_test_...)
# - STRIPE_WEBHOOK_SECRET (whsec_...)
# - RESEND_API_KEY
