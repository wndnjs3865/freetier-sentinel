name: sync-secrets-to-worker
# Push selected GitHub Secrets to Cloudflare Worker as runtime secrets.
# Avoids needing local wrangler login on mobile.
# Idempotent: re-running just overwrites with current values.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --save-dev wrangler@4

      - name: Sync RESEND_API_KEY
        if: env.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY

      - name: Sync STRIPE_SECRET_KEY
        if: env.STRIPE_SECRET_KEY != ''
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          echo "$STRIPE_SECRET_KEY" | npx wrangler secret put STRIPE_SECRET_KEY

      - name: Sync STRIPE_WEBHOOK_SECRET
        if: env.STRIPE_WEBHOOK_SECRET != ''
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          echo "$STRIPE_WEBHOOK_SECRET" | npx wrangler secret put STRIPE_WEBHOOK_SECRET

      - name: Sync TELEGRAM_BOT_TOKEN
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "$TELEGRAM_BOT_TOKEN" | npx wrangler secret put TELEGRAM_BOT_TOKEN

      - name: Sync TELEGRAM_CHAT_ID
        if: env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "$TELEGRAM_CHAT_ID" | npx wrangler secret put TELEGRAM_CHAT_ID

      - name: Sync NOTIFY_API_KEY
        if: env.NOTIFY_API_KEY != ''
        env:
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        run: |
          echo "$NOTIFY_API_KEY" | npx wrangler secret put NOTIFY_API_KEY

      - name: List current Worker secrets
        run: npx wrangler secret list
