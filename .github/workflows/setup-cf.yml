name: setup-cf-resources
# One-time bootstrap: creates KV namespace + D1 database, patches wrangler.toml,
# initializes the D1 schema, and commits the IDs back to main.
# Re-running is safe — skipped if IDs already real.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --save-dev wrangler@4

      - name: Skip if already provisioned
        id: gate
        run: |
          if grep -q "REPLACE_AFTER_CREATE" wrangler.toml; then
            echo "needs=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create KV namespace
        if: steps.gate.outputs.needs == 'true'
        id: kv
        run: |
          set -e
          out=$(npx wrangler kv namespace create freetier_sentinel_kv 2>&1 | tee /tmp/kv.out)
          echo "$out"
          # Format: id = "..."
          KV_ID=$(grep -oE 'id = "[a-f0-9]+"' /tmp/kv.out | head -1 | sed -E 's/id = "([a-f0-9]+)"/\1/')
          if [ -z "$KV_ID" ]; then
            # alt format: "id": "..."
            KV_ID=$(grep -oE '"id":\s*"[a-f0-9]+"' /tmp/kv.out | head -1 | sed -E 's/.*"([a-f0-9]+)".*/\1/')
          fi
          test -n "$KV_ID"
          echo "KV_ID=$KV_ID" >> "$GITHUB_ENV"
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"

      - name: Create D1 database
        if: steps.gate.outputs.needs == 'true'
        id: d1
        run: |
          set -e
          out=$(npx wrangler d1 create freetier-sentinel-db 2>&1 | tee /tmp/d1.out)
          echo "$out"
          D1_ID=$(grep -oE 'database_id = "[a-f0-9-]+"' /tmp/d1.out | head -1 | sed -E 's/database_id = "([a-f0-9-]+)"/\1/')
          if [ -z "$D1_ID" ]; then
            D1_ID=$(grep -oE '"database_id":\s*"[a-f0-9-]+"' /tmp/d1.out | head -1 | sed -E 's/.*"([a-f0-9-]+)".*/\1/')
          fi
          if [ -z "$D1_ID" ]; then
            # uuid format fallback
            D1_ID=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' /tmp/d1.out | head -1)
          fi
          test -n "$D1_ID"
          echo "D1_ID=$D1_ID" >> "$GITHUB_ENV"
          echo "d1_id=$D1_ID" >> "$GITHUB_OUTPUT"

      - name: Patch wrangler.toml
        if: steps.gate.outputs.needs == 'true'
        run: |
          # Replace KV id (the kv_namespaces section)
          python3 - <<'PY'
          import re, os
          p = "wrangler.toml"
          s = open(p).read()
          kv = os.environ["KV_ID"]
          d1 = os.environ["D1_ID"]
          # KV: replace the line under [[kv_namespaces]] block where id = "REPLACE_AFTER_CREATE"
          s = re.sub(r'(\[\[kv_namespaces\]\][^\[]*?id\s*=\s*)"REPLACE_AFTER_CREATE"', rf'\1"{kv}"', s, flags=re.DOTALL)
          # D1: replace database_id under [[d1_databases]]
          s = re.sub(r'(\[\[d1_databases\]\][^\[]*?database_id\s*=\s*)"REPLACE_AFTER_CREATE"', rf'\1"{d1}"', s, flags=re.DOTALL)
          open(p, "w").write(s)
          print("wrangler.toml patched")
          PY
          grep -E "^(database_id|id) " wrangler.toml || true

      - name: Apply D1 schema
        if: steps.gate.outputs.needs == 'true'
        run: |
          npx wrangler d1 execute freetier-sentinel-db --remote --file=src/db/schema.sql

      - name: Generate MASTER_KEY and set as Worker secret
        if: steps.gate.outputs.needs == 'true'
        run: |
          # 32 random bytes base64 → AES-256-GCM key
          KEY=$(openssl rand -base64 32)
          echo "$KEY" | npx wrangler secret put MASTER_KEY

      - name: Commit patched wrangler.toml
        if: steps.gate.outputs.needs == 'true'
        run: |
          if [ -n "$(git status --porcelain wrangler.toml)" ]; then
            git config user.name "autobiz-bot"
            git config user.email "autobiz-bot@users.noreply.github.com"
            git add wrangler.toml
            git commit -m "chore: provision Cloudflare KV + D1 (auto)"
            git push
          fi

      - name: Trigger deploy
        if: steps.gate.outputs.needs == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Already provisioned
        if: steps.gate.outputs.needs == 'false'
        run: echo "wrangler.toml has no REPLACE_AFTER_CREATE — nothing to do."
